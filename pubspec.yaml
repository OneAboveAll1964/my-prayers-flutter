name: my_prayers_flutter
description: My Prayers - prayer times, azkars, qibla, quran. Mobile companion to my-prayers-web.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.5.2
  go_router: ^16.0.0
  intl: ^0.20.2
  geolocator: ^14.0.0
  permission_handler: ^12.0.0
  flutter_compass: ^0.8.1
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.0
  audioplayers: ^6.1.0
  home_widget: ^0.7.0
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: false
  assets:
    - assets/db/
    - assets/quran/
    - assets/audio/
    - assets/widget/
  fonts:
    - family: UthmanicHafs
      fonts:
        - asset: assets/fonts/UthmanicHafs.ttf
    - family: AmiriQuran
      fonts:
        - asset: assets/fonts/AmiriQuran.ttf
    - family: KfgqpcNastaleeq
      fonts:
        - asset: assets/fonts/KfgqpcNastaleeq.ttf
    - family: ScheherazadeNew
      fonts:
        - asset: assets/fonts/ScheherazadeNew-Regular.ttf
        - asset: assets/fonts/ScheherazadeNew-Bold.ttf
          weight: 700
    - family: NotoNaskhArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Regular.ttf
        - asset: assets/fonts/NotoNaskhArabic-Bold.ttf
          weight: 700
